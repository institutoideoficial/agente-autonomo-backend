# Speakers CRM + Bravos + Caddy (HTTPS auto)
# Rodar em uma VPS com Docker Engine + Compose v2 instalado.
#
# Variaveis obrigatorias em .env (mesma pasta deste arquivo):
#   DOMAIN_CRM=crm.seudominio.com         # ou IP se nao tiver dominio
#   DOMAIN_BRAVOS=wa.seudominio.com       # (opcional) painel QR do Bravos
#   API_TOKEN=sp_xxxxxxxxxxxxxxxxxxxx     # token compartilhado CRM<->Bravos
#   ANTHROPIC_API_KEY=sk-ant-xxx          # opcional; sem isso /api/bot fica desativado
#   ACME_EMAIL=seu@email.com              # pra Let's Encrypt

services:
  bravos:
    build:
      context: ../../bravos-whatsapp-api
      dockerfile: Dockerfile
    container_name: bravos
    restart: unless-stopped
    environment:
      API_TOKEN: ${API_TOKEN}
      CLIENT_ID: speakers-crm
      DB_PATH: /app/data/whatsapp.db
      LOG_LEVEL: info
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      WEBHOOK_URL: http://crm:3000/api/webhook/bravos
      PORT: "3001"
    volumes:
      - bravos_wwebjs:/app/.wwebjs_auth   # sessao WhatsApp persistente
      - bravos_data:/app/data             # SQLite persistente
    expose:
      - "3001"
    # NAO exponho a porta ao host; Caddy eh o unico ponto de entrada

  bravos-agent:
    # 2a instancia do Bravos dedicada ao agente autonomo (numero 6258)
    # Sessao WhatsApp separada da Vanessa (3600).
    build:
      context: ../../bravos-whatsapp-api
      dockerfile: Dockerfile
    container_name: bravos-agent
    restart: unless-stopped
    environment:
      API_TOKEN: ${API_TOKEN}
      CLIENT_ID: agent-bot
      DB_PATH: /app/data/whatsapp.db
      LOG_LEVEL: info
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      WEBHOOK_URL: http://agent:8000/inbox-bravos
      PORT: "3001"
    volumes:
      - bravos_agent_wwebjs:/app/.wwebjs_auth
      - bravos_agent_data:/app/data
    expose:
      - "3001"

  crm:
    build:
      context: ../
      dockerfile: infra/Dockerfile
    container_name: crm
    restart: unless-stopped
    # v4.32: env_file carrega TODAS as vars do .env automaticamente
    # (incluindo GREENN_TOKEN, EDUZZ_HMAC_SECRET, HOTMART_HOTTOK, KIWIFY_TOKEN, BASIC_AUTH_*, etc)
    env_file:
      - .env
    environment:
      PORT: "3000"
      BRAVOS_URL: ${BRAVOS_URL:-http://bravos:3001}
      BRAVOS_TOKEN: ${API_TOKEN}
      BRAVOS_AGENT_URL: ${BRAVOS_AGENT_URL:-http://bravos-agent:3001}
      AGENT_URL: ${AGENT_URL:-http://agent:8000}
      GOOGLE_AUTO_EVENT: ${GOOGLE_AUTO_EVENT:-false}
      GOOGLE_AUTO_EVENT_DELAY_HOURS: ${GOOGLE_AUTO_EVENT_DELAY_HOURS:-24}
      GOOGLE_AUTO_EVENT_DURATION_MIN: ${GOOGLE_AUTO_EVENT_DURATION_MIN:-30}
    volumes:
      - crm_data:/app/data
      # v4.32: backup folder readonly pra /api/backup/drive/upload acessar
      - /opt/backups:/opt/backups:ro
    expose:
      - "3000"
    depends_on:
      - bravos
      - bravos-agent
      - agent

  agent:
    build:
      context: ../agent-python
      dockerfile: Dockerfile
    container_name: agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AGENT_MODEL: ${AGENT_MODEL:-claude-opus-4-7}
      AGENT_MODEL_FAST: ${AGENT_MODEL_FAST:-claude-haiku-4-5}
      AGENT_MODE: ${AGENT_MODE:-treino}
      AGENT_WHITELIST: ${AGENT_WHITELIST:-5512982933600}
      AGENT_DB_PATH: /app/data/agent.db
      AGENT_LOG_LEVEL: ${AGENT_LOG_LEVEL:-INFO}
      CRM_URL: ${CRM_URL:-http://crm:3000}
      BRAVOS_URL: ${AGENT_BRAVOS_URL:-http://bravos-agent:3001}
      BRAVOS_TOKEN: ${API_TOKEN}
      AGENT_GOOGLE_CLIENT_ID: ${AGENT_GOOGLE_CLIENT_ID:-}
      AGENT_GOOGLE_CLIENT_SECRET: ${AGENT_GOOGLE_CLIENT_SECRET:-}
      AGENT_OAUTH_REDIRECT_URI: ${AGENT_OAUTH_REDIRECT_URI:-https://crm.institutoideoficial.com.br/agent-oauth/google/callback}
    volumes:
      - agent_data:/app/data
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN_CRM: ${DOMAIN_CRM}
      DOMAIN_BRAVOS: ${DOMAIN_BRAVOS:-}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # certificados Let's Encrypt
      - caddy_config:/config
    depends_on:
      - crm
      - bravos

volumes:
  crm_data:
  bravos_wwebjs:
  bravos_data:
  bravos_agent_wwebjs:
  bravos_agent_data:
  agent_data:
  caddy_data:
  caddy_config:

