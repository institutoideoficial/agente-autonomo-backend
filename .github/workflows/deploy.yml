name: Setup VPS
on:
  workflow_dispatch:
jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Test SSH ports
        run: |
          for port in 22 22222 2222; do
            echo -n "Port $port: "
            timeout 5 bash -c "cat < /dev/null > /dev/tcp/147.93.39.48/$port" 2>/dev/null && echo "OPEN" || echo "closed"
          done

      - name: Install Evolution API
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 147.93.39.48
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 120s
          command_timeout: 600s
          script: |
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -y
            apt-get install -y docker.io docker-compose curl
            mkdir -p /opt/evo && cd /opt/evo
            curl -fsSL https://raw.githubusercontent.com/Labastie/agente-autonomo-backend/main/infra/docker-compose.yml -o docker-compose.yml
            docker-compose up -d
            sleep 20
            curl -s http://localhost:8080
            echo "DONE"
