<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>Speakers CRM Imperador — Login</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/icon-192.svg">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,sans-serif;background:#0a0a0a;color:#e8e6e1;-webkit-font-smoothing:antialiased}
  .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at top,#1a1612 0%,#0a0a0a 60%)}
  .card{width:100%;max-width:440px;background:#141312;border:1px solid #262421;border-radius:16px;padding:28px 28px 24px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .logo{display:flex;align-items:center;gap:12px;margin-bottom:24px}
  .logo-mark{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#C8A84B 0%,#a08538 100%);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:#111;box-shadow:0 4px 14px rgba(200,168,75,.3)}
  .logo-tx{font-size:13px;color:#8a8580;text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
  .logo-tx .br{display:block;font-size:18px;color:#e8e6e1;font-weight:800;letter-spacing:.5px;text-transform:none;margin-top:2px}
  .tabs{display:flex;background:#0d0c0b;border:1px solid #262421;border-radius:10px;padding:4px;margin-bottom:20px}
  .tab{flex:1;padding:10px 14px;text-align:center;font-size:13px;font-weight:600;color:#8a8580;cursor:pointer;border-radius:7px;border:none;background:transparent;transition:all .2s}
  .tab.active{background:#1f1d1a;color:#C8A84B;box-shadow:0 1px 3px rgba(0,0,0,.4)}
  .form{display:flex;flex-direction:column;gap:14px}
  .field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#8a8580;font-weight:600;margin-bottom:6px}
  .field input{width:100%;background:#0d0c0b;border:1px solid #262421;border-radius:8px;padding:12px 14px;font-size:14px;color:#e8e6e1;font-family:inherit;outline:none;transition:border-color .2s}
  .field input:focus{border-color:#C8A84B}
  .field input::placeholder{color:#5a5550}
  .submit{margin-top:6px;width:100%;background:linear-gradient(135deg,#C8A84B 0%,#b89540 100%);color:#111;border:none;padding:13px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:transform .1s, box-shadow .2s;box-shadow:0 4px 14px rgba(200,168,75,.2)}
  .submit:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(200,168,75,.35)}
  .submit:active{transform:translateY(0)}
  .submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .err{background:#3a1a1a;border:1px solid #ef4444;color:#fca5a5;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:6px}
  .ok{background:#0d2818;border:1px solid #10b981;color:#86efac;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:6px}
  .hint{font-size:11px;color:#5a5550;margin-top:4px}
  .badge{display:inline-block;background:#3a2e0a;color:#C8A84B;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-left:6px}
  .footer{text-align:center;margin-top:18px;font-size:11px;color:#5a5550}
  .footer a{color:#8a8580;text-decoration:none}
  @media (max-width:480px){.card{padding:22px 20px;border-radius:14px}.logo-mark{width:42px;height:42px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo">
      <div class="logo-mark">SP</div>
      <div class="logo-tx">SPEAKERS<span class="br">CRM Imperador</span></div>
    </div>

    <div class="tabs" role="tablist">
      <button class="tab active" id="tab-login" onclick="showTab('login')">Entrar</button>
      <button class="tab" id="tab-signup" onclick="showTab('signup')">Criar conta <span id="badge-admin" class="badge" style="display:none">PRIMEIRO = ADMIN</span></button>
    </div>

    <div id="msg"></div>

    <!-- LOGIN -->
    <form id="form-login" class="form" onsubmit="return doLogin(event)">
      <div class="field">
        <label for="li-email">Email</label>
        <input type="email" id="li-email" placeholder="seu@email.com" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="li-pass">Senha</label>
        <input type="password" id="li-pass" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <div class="field" id="totp-wrap" style="display:none">
        <label for="li-totp">Código 2FA (6 dígitos)</label>
        <input type="text" id="li-totp" placeholder="000000" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code">
        <div class="hint">App Authenticator (Google/Authy/1Password). Código muda a cada 30s.</div>
      </div>
      <button type="submit" class="submit" id="li-btn">Entrar</button>
    </form>

    <!-- SIGNUP -->
    <form id="form-signup" class="form" style="display:none" onsubmit="return doSignup(event)">
      <div class="field">
        <label for="su-name">Nome</label>
        <input type="text" id="su-name" placeholder="Vanessa Labastie" autocomplete="name" required>
      </div>
      <div class="field">
        <label for="su-email">Email</label>
        <input type="email" id="su-email" placeholder="seu@email.com" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="su-pass">Senha</label>
        <input type="password" id="su-pass" placeholder="minimo 6 caracteres" autocomplete="new-password" minlength="6" required>
        <div class="hint">Use uma senha forte. Sera guardada com bcrypt no servidor.</div>
      </div>
      <div class="field" id="invite-wrap" style="display:none">
        <label for="su-invite">Codigo de convite</label>
        <input type="text" id="su-invite" placeholder="codigo enviado pelo admin">
      </div>
      <button type="submit" class="submit" id="su-btn">Criar conta</button>
    </form>

    <div class="footer">
      Acesso protegido • <a href="/healthz" target="_blank">status</a>
    </div>
  </div>
</div>

<script>
var nextUrl = (function(){ try{ return new URLSearchParams(location.search).get('next') || '/app'; }catch(e){ return '/app'; } })();
function showMsg(text, isError){
  var el = document.getElementById('msg');
  el.innerHTML = text ? ('<div class="' + (isError?'err':'ok') + '">' + esc(text) + '</div>') : '';
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showTab(which){
  document.getElementById('tab-login').classList.toggle('active', which==='login');
  document.getElementById('tab-signup').classList.toggle('active', which==='signup');
  document.getElementById('form-login').style.display = which==='login' ? 'flex' : 'none';
  document.getElementById('form-signup').style.display = which==='signup' ? 'flex' : 'none';
  showMsg('', false);
}
async function doLogin(e){
  e.preventDefault();
  var btn = document.getElementById('li-btn');
  btn.disabled = true; btn.textContent = 'Entrando...';
  showMsg('', false);
  try{
    var totpEl = document.getElementById('li-totp');
    var body = {
      email: document.getElementById('li-email').value,
      password: document.getElementById('li-pass').value
    };
    if(totpEl && totpEl.value) body.totp = totpEl.value.replace(/\D/g,'');
    var r = await fetch('/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    var d = await r.json();
    if(!d.ok){
      // v4.34: precisa 2FA
      if(d.requires2FA){
        var wrap = document.getElementById('totp-wrap');
        if(wrap){
          wrap.style.display = 'block';
          showMsg(d.error || 'Conta com 2FA - digite o codigo do app', false);
          var inp = document.getElementById('li-totp'); if(inp){ inp.required = true; inp.focus(); }
          btn.disabled=false; btn.textContent='Entrar';
          return;
        }
      }
      showMsg(d.error || 'Erro ao entrar', true); btn.disabled=false; btn.textContent='Entrar'; return;
    }
    showMsg('✓ Bem-vinda, ' + d.user.name + '! Redirecionando...');
    setTimeout(function(){ location.href = nextUrl; }, 400);
  }catch(err){
    showMsg('Erro de conexao: ' + err.message, true);
    btn.disabled=false; btn.textContent='Entrar';
  }
  return false;
}
async function doSignup(e){
  e.preventDefault();
  var btn = document.getElementById('su-btn');
  btn.disabled = true; btn.textContent = 'Criando...';
  showMsg('', false);
  try{
    var r = await fetch('/auth/signup', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        name: document.getElementById('su-name').value,
        email: document.getElementById('su-email').value,
        password: document.getElementById('su-pass').value,
        inviteCode: document.getElementById('su-invite').value
      })
    });
    var d = await r.json();
    if(!d.ok){ showMsg(d.error || 'Erro ao criar conta', true); btn.disabled=false; btn.textContent='Criar conta'; return; }
    var roleMsg = d.user.role === 'admin' ? ' (voce eh ADMIN)' : '';
    showMsg('✓ Conta criada' + roleMsg + '! Redirecionando...');
    setTimeout(function(){ location.href = nextUrl; }, 600);
  }catch(err){
    showMsg('Erro de conexao: ' + err.message, true);
    btn.disabled=false; btn.textContent='Criar conta';
  }
  return false;
}
// Carrega contagem de usuarios pra mostrar "voce sera o admin"
fetch('/auth/users-count').then(function(r){return r.json();}).then(function(d){
  if(d.count === 0){ document.getElementById('badge-admin').style.display = 'inline-block'; }
  if(d.requiresInvite){ document.getElementById('invite-wrap').style.display = 'block'; document.getElementById('su-invite').required = true; }
}).catch(function(){});
// Pre-fill email se passado
try{ var e = new URLSearchParams(location.search).get('email'); if(e){ document.getElementById('li-email').value = e; document.getElementById('su-email').value = e; } }catch(err){}
</script>
</body>
</html>
